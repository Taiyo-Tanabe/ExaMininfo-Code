<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 410 110">
  <!-- EM mark: scale 0.694, 5px top padding -->
  <g transform="translate(0, 5) scale(0.694)">
    <!-- E -->
    <rect x="0"  y="0"  width="96" height="144" rx="5" fill="#FF6600"/>
    <rect x="28" y="46" width="68" height="20"  fill="white"/>
    <rect x="28" y="78" width="68" height="20"  fill="white"/>
    <!-- M left leg -->
    <rect x="112" y="0" width="40" height="144" rx="5" fill="#FF6600"/>
    <!-- M right leg -->
    <rect x="300" y="0" width="40" height="144" rx="5" fill="#FF6600"/>
    <!-- M left diagonal -->
    <polygon points="112,0 152,0 222,88 182,88" fill="#FF6600"/>
    <!-- M right diagonal -->
    <polygon points="340,0 300,0 218,88 258,88" fill="#FF6600"/>
  </g>

  <!-- Text: 2-line layout for "大学情報ソーシャルメディア" -->
  <text
    x="252"
    y="40"
    dominant-baseline="middle"
    font-family="'Noto Sans JP', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Segoe UI', sans-serif"
    font-size="28"
    font-weight="700"
    fill="#29B6F6"
  >大学情報</text>
  <text
    x="252"
    y="74"
    dominant-baseline="middle"
    font-family="'Noto Sans JP', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Segoe UI', sans-serif"
    font-size="19"
    font-weight="600"
    fill="#29B6F6"
  >ソーシャルメディア</text>
</svg>
