<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 144">
  <!-- E: full body then white cutouts -->
  <rect x="0"  y="0"  width="96" height="144" rx="5" fill="#FF6600"/>
  <rect x="28" y="46" width="68" height="20"  fill="white"/>
  <rect x="28" y="78" width="68" height="20"  fill="white"/>

  <!-- M: left leg -->
  <rect x="112" y="0" width="40" height="144" rx="5" fill="#FF6600"/>
  <!-- M: right leg -->
  <rect x="300" y="0" width="40" height="144" rx="5" fill="#FF6600"/>
  <!-- M: left diagonal strip (left-leg-top down to valley center) -->
  <polygon points="112,0 152,0 222,88 182,88" fill="#FF6600"/>
  <!-- M: right diagonal strip (right-leg-top down to valley center) -->
  <polygon points="340,0 300,0 218,88 258,88" fill="#FF6600"/>
</svg>
